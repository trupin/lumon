[project]
name = "lumon"
version = "0.1.0"
description = "A minimal, safe, pseudocode-like interpreted language for AI agents"
requires-python = ">=3.11"
dependencies = ["lark>=1.3"]

[project.optional-dependencies]
dev = ["pytest", "pyright"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.pyright]
venvPath = "."
venv = ".venv"
